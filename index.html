<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Title and Meta Description Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            color: #333;
        }

        label {
            font-size: 18px;
            color: #555;
            display: block;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .status {
            font-weight: bold;
            font-size: 16px;
        }

        .green {
            color: green;
        }

        .red {
            color: red;
        }

        .yellow {
            color: orange;
        }

        .preview {
            padding: 10px;
            width: 90%;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: "Courier New", monospace;
            color: #222;
        }

        .section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SEO Title and Meta Description Checker</h1>

    <!-- SEO Title Checker -->
    <div>
        <label for="seo-title">Enter SEO Title:</label>
        <input type="text" id="seo-title" placeholder="Enter your SEO title here...">
        
        <div class="status">
            Status: <span id="status" class="yellow">Optimal Length (50-60 characters recommended)</span>
        </div>

        <h2>Preview:</h2>
        <div class="preview" id="seo-preview">Your SEO title will appear here...</div>
    </div>

    <!-- Meta Description Checker -->
    <div class="section">
        <h2>Meta Description Checker</h2>
        <label for="meta-description">Enter Meta Description:</label>
        <input type="text" id="meta-description" placeholder="Enter your Meta description here...">
        
        <div class="status">
            Status: <span id="meta-status" class="yellow">Optimal Length (145-155 characters recommended)</span>
        </div>

        <h3>Preview:</h3>
        <div class="preview" id="meta-preview">Your Meta description will appear here...</div>
    </div>
</div>

<script>
    // SEO Title Checker
    const seoTitleInput = document.getElementById("seo-title");
    const statusText = document.getElementById("status");
    const preview = document.getElementById("seo-preview");

    seoTitleInput.addEventListener("input", function() {
        const title = seoTitleInput.value;
        const titleLength = title.length;

        // Update the preview
        preview.textContent = title;

        // Status based on character count
        if (titleLength > 60) {
            statusText.textContent = "Title too long!";
            statusText.className = "red";
        } else if (titleLength < 50) {
            statusText.textContent = "Title too short!";
            statusText.className = "yellow";
        } else {
            statusText.textContent = "Optimal length.";
            statusText.className = "green";
        }
    });

    // Meta Description Checker
    const metaDescriptionInput = document.getElementById("meta-description");
    const metaStatusText = document.getElementById("meta-status");
    const metaPreview = document.getElementById("meta-preview");

    metaDescriptionInput.addEventListener("input", function() {
        const description = metaDescriptionInput.value;
        const descriptionLength = description.length;

        // Update the preview
        metaPreview.textContent = description;

        // Status based on character count
        if (descriptionLength > 155) {
            metaStatusText.textContent = "Meta description too long!";
            metaStatusText.className = "red";
        } else if (descriptionLength < 140) {
            metaStatusText.textContent = "Meta description too short!";
            metaStatusText.className = "yellow";
        } else if (descriptionLength >= 145 && descriptionLength <= 155) {
            metaStatusText.textContent = "Optimal length.";
            metaStatusText.className = "green";
        } else {
            metaStatusText.textContent = "Meta description too short!";
            metaStatusText.className = "yellow";
        }
    });
</script>

</body>
</html>
